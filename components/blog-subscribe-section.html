<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Subscribe Section Component</title>
    <link rel="stylesheet" href="blog-subscribe-section.css" data-component="blog-subscribe-section">
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <section class="blog-subscribe-section" aria-labelledby="bs-heading">
        <div class="blog-subscribe-container">
            <div class="blog-subscribe-header">
                <div class="bs-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </div>
                <h2 id="bs-heading">Stay Connected with Our Blog</h2>
                <p>Get notified when we publish new reflections and pilgrimage guides</p>
                <div class="blog-subscribe-separator"></div>
            </div>

            <div class="blog-subscribe-card">
                <div class="blog-subscribe-card-header">
                    <h3>Subscribe to New Posts</h3>
                    <p>Choose how you'd like to be notified.</p>
                </div>

                <form id="blog-subscribe-form" class="bs-form" novalidate>
                    <!-- Honeypot field (anti-bot) -->
                    <div style="position: absolute; left: -9999px;" aria-hidden="true">
                        <label for="bs-website">Website (leave blank)</label>
                        <input type="text" id="bs-website" name="website" tabindex="-1" autocomplete="off">
                    </div>

                    <div class="bs-form-grid">
                        <!-- Name -->
                        <div class="bs-form-group">
                            <label for="bs-name">Name <span class="bs-required">*</span></label>
                            <input type="text" id="bs-name" name="name" required placeholder="Your name"
                                autocomplete="name">
                            <span class="bs-error-message" id="bs-name-error"></span>
                        </div>

                        <!-- Notification Preference -->
                        <div class="bs-form-group">
                            <label for="bs-notificationPref">Notification Preference <span
                                    class="bs-required">*</span></label>
                            <select id="bs-notificationPref" name="notificationPref" required>
                                <option value="">Select an option</option>
                                <option value="WhatsApp">WhatsApp</option>
                                <option value="Correo">Email</option>
                            </select>
                            <span class="bs-error-message" id="bs-notificationPref-error"></span>
                        </div>

                        <!-- Email (shown when Email is selected) -->
                        <div class="bs-form-group bs-conditional-field" id="bs-email-group" style="display:none">
                            <label for="bs-email">Email <span class="bs-required">*</span></label>
                            <input type="email" id="bs-email" name="email" placeholder="you@email.com"
                                autocomplete="email">
                            <span class="bs-error-message" id="bs-email-error"></span>
                        </div>

                        <!-- Phone (shown when WhatsApp is selected) -->
                        <div class="bs-form-group bs-conditional-field" id="bs-phone-group" style="display:none">
                            <label for="bs-phone">Phone <span class="bs-required">*</span></label>
                            <div class="bs-phone-group">
                                <select id="bs-countryCode" name="countryCode" aria-label="Country code" autocomplete="tel-country-code">
                                    <option value="+1">+1 (US/CA)</option>
                                    <option value="+44">+44 (UK)</option>
                                    <option value="+52">+52 (MX)</option>
                                    <option value="+53">+53 (CU)</option>
                                    <option value="+57">+57 (CO)</option>
                                    <option value="+58">+58 (VE)</option>
                                    <option value="+34">+34 (ES)</option>
                                    <option value="+33">+33 (FR)</option>
                                    <option value="+49">+49 (DE)</option>
                                    <option value="+39">+39 (IT)</option>
                                    <option value="+55">+55 (BR)</option>
                                    <option value="+54">+54 (AR)</option>
                                    <option value="+56">+56 (CL)</option>
                                    <option value="+51">+51 (PE)</option>
                                    <option value="+507">+507 (PA)</option>
                                    <option value="+506">+506 (CR)</option>
                                    <option value="+503">+503 (SV)</option>
                                    <option value="+502">+502 (GT)</option>
                                    <option value="+504">+504 (HN)</option>
                                    <option value="+505">+505 (NI)</option>
                                    <option value="+509">+509 (HT)</option>
                                    <option value="+1-876">+1-876 (JM)</option>
                                    <option value="+1-809">+1-809 (DO)</option>
                                    <option value="+1-787">+1-787 (PR)</option>
                                    <option value="+91">+91 (IN)</option>
                                    <option value="+86">+86 (CN)</option>
                                    <option value="+81">+81 (JP)</option>
                                    <option value="+82">+82 (KR)</option>
                                    <option value="+61">+61 (AU)</option>
                                    <option value="+64">+64 (NZ)</option>
                                    <option value="+27">+27 (ZA)</option>
                                    <option value="+234">+234 (NG)</option>
                                    <option value="+971">+971 (AE)</option>
                                    <option value="+966">+966 (SA)</option>
                                    <option value="+972">+972 (IL)</option>
                                    <option value="+7">+7 (RU)</option>
                                    <option value="+48">+48 (PL)</option>
                                    <option value="+31">+31 (NL)</option>
                                    <option value="+46">+46 (SE)</option>
                                    <option value="+41">+41 (CH)</option>
                                    <option value="+43">+43 (AT)</option>
                                    <option value="+351">+351 (PT)</option>
                                    <option value="+353">+353 (IE)</option>
                                    <option value="+63">+63 (PH)</option>
                                </select>
                                <input type="tel" id="bs-phone" name="phone" placeholder="(555) 123-4567"
                                    autocomplete="tel-national">
                            </div>
                            <span class="bs-error-message" id="bs-phone-error"></span>
                        </div>
                    </div>

                    <!-- Consent Checkbox -->
                    <div class="bs-consent-section">
                        <div class="bs-checkbox-group">
                            <input type="checkbox" id="bs-consentSubscribe" name="consentSubscribe" required>
                            <label for="bs-consentSubscribe">
                                I agree to receive blog notifications from Sky Travel JM <span
                                    class="bs-required">*</span>
                            </label>
                            <span class="bs-error-message" id="bs-consentSubscribe-error"></span>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="bs-form-submit">
                        <button type="submit" class="bs-submit-btn" id="bs-submit-btn">
                            Subscribe
                        </button>
                    </div>

                    <!-- Privacy Note -->
                    <p class="bs-privacy-note">
                        By subscribing, you allow Sky Travel JM to notify you about new blog posts via your
                        preferred method. You can unsubscribe at any time.
                    </p>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
