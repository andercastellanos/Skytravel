<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#c8a97e">
  <title>Portal Empleados — Sky Travel J&M</title>

  <!-- Favicon -->
  <link rel="icon" href="images/favicon/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">

  <link rel="stylesheet" href="style.css">

  <style>
    /* Page-specific styles */
    .receipt-header {
      text-align: center;
      padding: 20px 0;
      background: #ffffff;
      border-bottom: 2px solid #f0ebe3;
    }

    .receipt-header img {
      max-width: 140px;
      height: auto;
    }

    .portal-container {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Access gate */
    .access-gate {
      text-align: center;
      padding: 48px 24px;
    }

    .access-gate h1 {
      color: #2c3e50;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .access-gate p {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .access-form {
      display: flex;
      justify-content: center;
      gap: 10px;
      max-width: 340px;
      margin: 0 auto;
    }

    .access-input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
      transition: border-color 0.2s;
    }

    .access-input:focus {
      outline: none;
      border-color: #c8a97e;
      box-shadow: 0 0 0 3px rgba(200, 169, 126, 0.15);
    }

    .access-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #c8a97e 0%, #b69268 100%);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .access-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(200, 169, 126, 0.35);
    }

    /* Dashboard */
    .dashboard {
      display: none;
    }

    .dashboard.visible {
      display: block;
    }

    .dashboard-title {
      text-align: center;
      color: #2c3e50;
      font-size: 1.5rem;
      margin-bottom: 32px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }

    .tool-card {
      background: #ffffff;
      border: 2px solid #c8a97e;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .tool-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(200, 169, 126, 0.2);
    }

    .tool-icon {
      font-size: 2.2rem;
      margin-bottom: 14px;
      display: block;
    }

    .tool-card h2 {
      font-size: 1rem;
      color: #2c3e50;
      margin: 0 0 8px;
    }

    .tool-card p {
      font-size: 0.82rem;
      color: #888;
      margin: 0;
      line-height: 1.4;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #c41e3a;
      color: #fff;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .tools-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .tool-card {
        padding: 22px 16px;
      }

      .access-form {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <!-- Minimal header: logo only -->
  <div class="receipt-header">
    <a href="/">
      <img src="imagesWebp/Logo.webp" alt="Sky Travel J&M" />
    </a>
  </div>

  <div class="portal-container">
    <!-- Access gate -->
    <div class="access-gate" id="access-gate">
      <h1>Portal de Empleados</h1>
      <p>Ingresa el codigo de acceso para continuar</p>
      <div class="access-form">
        <input type="password" id="access-code" class="access-input" placeholder="Codigo de acceso" autocomplete="off" />
        <button type="button" id="access-btn" class="access-btn">Entrar</button>
      </div>
    </div>

    <!-- Dashboard (hidden until unlocked) -->
    <div class="dashboard" id="dashboard">
      <h1 class="dashboard-title">Herramientas</h1>
      <div class="tools-grid">
        <a href="/recibo" class="tool-card">
          <span class="tool-icon">🧾</span>
          <h2>Recibo</h2>
          <p>Generar recibos de pago para clientes</p>
        </a>
        <a href="/estado" class="tool-card">
          <span class="tool-icon">📊</span>
          <h2>Estado de Cuenta</h2>
          <p>Crear estados de cuenta detallados</p>
        </a>
        <a href="/cumpleanos" class="tool-card">
          <span class="tool-icon">🎂</span>
          <h2>Cumpleanos</h2>
          <p>Enviar tarjetas de felicitacion</p>
        </a>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">Codigo incorrecto</div>

  <script src="js/empleados.js"></script>
</body>

</html>
